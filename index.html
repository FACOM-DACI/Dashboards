<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboards FACOM</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: white;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 2.5rem;
            letter-spacing: 1px;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: white;
            color: #333;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .card h2 {
            margin-top: 0;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 25px;
            background: #2a5298;
            color: white;
            text-decoration: none;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #1e3c72;
        }

        footer {
            margin-top: 50px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <h1>📊 Dashboards FACOM </h1>

    <div class="dashboard-container">
        
        <div class="card">
            <h2>Trámites Digitalizados</h2>

            <iframe 
              title="Trámites Digitalizados"
              width="100%"
              height="300"
              src="https://app.powerbi.com/view?r=eyJrIjoiYzI1MDJiYmItYTA3YS00YWUyLWE5ZTItMGI0MjVhYWJlYWQ4IiwidCI6ImZmMWNiNDg2LWQ5MTItNDllMy05NDM0LTEyMmU5YzQ1ODk1ZSIsImMiOjR9"
              frameborder="0"
              allowFullScreen="true">
</iframe>
        </div>

        <div class="card">
            <h2>Medidas Ejecutadas ENFC </h2>
            <p>Medidas Estrategia Nacional de Facilitación del Comercio (ENFC) </p>
              <iframe 
              title="Trámites Digitalizados"
              width="100%"
              height="300"
              src="AQUI_PEGA_TU_EMBED_URL"
              frameborder="0"
              allowFullScreen="true">
</iframe>
        </div>

        <div class="card">
            <h2>Reuniones de Facilitación del Comercio</h2>
            <p>Monitoreo de las reuniones de </p>
              <iframe 
              title="Trámites Digitalizados"

              src="AQUI_PEGA_TU_EMBED_URL"
              frameborder="0"
              allowFullScreen="true">
</iframe>
        </div>

    <footer>
        © 2026 - Gabriel Rivas
    </footer>

</body>
</html>

</body>
</html>
