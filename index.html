<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Dashboards</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: white;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 2.5rem;
            letter-spacing: 1px;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: white;
            color: #333;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .card h2 {
            margin-top: 0;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 25px;
            background: #2a5298;
            color: white;
            text-decoration: none;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #1e3c72;
        }

        footer {
            margin-top: 50px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <h1>📊 Mis Dashboards</h1>

    <div class="dashboard-container">
        
        <div class="card">
            <h2>Dashboard 1</h2>
            <p>Indicadores estratégicos y métricas clave.</p>
            <a href="#" class="btn">Ver Dashboard</a>
        </div>

        <div class="card">
            <h2>Dashboard 2</h2>
            <p>Análisis comparativo y tendencias.</p>
            <a href="#" class="btn">Ver Dashboard</a>
        </div>

        <div class="card">
            <h2>Dashboard 3</h2>
            <p>Monitoreo en tiempo real.</p>
            <a href="#" class="btn">Ver Dashboard</a>
        </div>

    </div>

    <footer>
        © 2026 - Gabriel Rivas
    </footer>

</body>
</html>
